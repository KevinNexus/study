<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>深夜书房 v2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tg-theme-bg-color: #0f172a; }
        body { background: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; }
        .playing-ani { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="text-center">
        <h1 class="text-2xl font-extralight tracking-[0.3em] mb-1">深夜书房</h1>
        <p class="text-[10px] text-blue-400 opacity-50 tracking-[0.5em]">MIDNIGHT CABIN</p>
    </div>

    <div class="w-full max-w-[320px] glass p-10 text-center relative">
        <div id="disk-bg" class="w-32 h-32 mx-auto rounded-full border-2 border-white/5 mb-8 flex items-center justify-center">
            <div id="dot" class="w-4 h-4 bg-blue-500/30 rounded-full"></div>
        </div>
        
        <p id="quote" class="text-sm text-gray-300 font-light leading-relaxed min-h-[60px] mb-6 flex items-center justify-center italic"></p>

        <audio id="player" preload="auto"></audio>

        <div class="flex flex-col items-center gap-6">
            <button onclick="togglePlay()" class="w-16 h-16 rounded-full bg-white/5 border border-white/10 flex items-center justify-center active:scale-95 transition-all">
                <span id="p-icon" class="text-white text-xl">▶</span>
            </button>
            <button onclick="change()" class="text-[11px] text-blue-400/60 border-b border-blue-400/20 pb-1 tracking-[0.2em]">🌓 换一场心境</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 w-full max-w-[320px]">
        <button onclick="tg.openTelegramLink('https://t.me/cnudo')" class="py-3 glass text-[10px] text-gray-400">索引站</button>
        <button onclick="tg.openTelegramLink('https://t.me/cxsns')" class="py-3 glass text-[10px] text-gray-400">软件站</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const audio = document.getElementById('player');
        const icon = document.getElementById('p-icon');
        const quote = document.getElementById('quote');
        const disk = document.getElementById('disk-bg');

        // 核心优化：使用稳定、轻量的 mp3 预览直链
        const playlist = [
            { src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3", txt: "“心静，则万物皆安。”" },
            { src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", txt: "“在琴声里，找回那个安静的自己。”" },
            { src: "https://p.scdn.co/mp3-preview/2d88a9134a6e4e0828f64582f3a4794121544f86", txt: "“万籁俱寂，唯余书香与弦音。”" },
            { src: "https://p.scdn.co/mp3-preview/5567b54a8830722359b3506a7263b6a957297e2c", txt: "“此时此刻，世界与你无关。”" }
        ];

        function change() {
            const track = playlist[Math.floor(Math.random() * playlist.length)];
            audio.src = track.src;
            quote.innerText = track.txt;
            audio.play().then(() => {
                icon.innerText = "⏸";
                disk.classList.add('playing-ani');
            }).catch(() => {
                icon.innerText = "▶";
                disk.classList.remove('playing-ani');
            });
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); icon.innerText = "⏸"; disk.classList.add('playing-ani'); } 
            else { audio.pause(); icon.innerText = "▶"; disk.classList.remove('playing-ani'); }
        }

        window.onload = change;
    </script>
</body>
</html>
