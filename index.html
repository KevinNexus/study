<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <meta name="description" content="资源公社 · 深夜书房 | 代码生成助眠音景">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🌙 深夜书房 - 资源公社旗下</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' } },
                    animation: { 'float': 'float 6s ease-in-out infinite', 'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>

    <style>
        :root { --bg: #0f172a; --surface: rgba(30, 41, 59, 0.85); --text: #f1f5f9; --glow: 0 0 40px rgba(99, 102, 241, 0.4); }
        body {
            background: var(--bg); color: var(--text);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 16px; overflow: hidden; transition: background 0.6s ease; -webkit-tap-highlight-color: transparent;
        }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: -1; background: radial-gradient(ellipse at 50% 0%, #1e1b4b 0%, #0f172a 40%, #020617 100%); }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 4s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(1); } 100% { opacity: 0.8; transform: scale(1.5); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .glass {
            background: var(--surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25); transition: transform 0.3s;
        }
        .glass:hover { transform: translateY(-4px); }

        .vinyl {
            width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle, #111 20%, #222 21%, #111 22%, #222 35%, #111 36%, #222 55%, #111 56%);
            border: 3px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center;
            position: relative; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .vinyl.playing { animation: spin 24s linear infinite; box-shadow: var(--glow); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .vinyl::after { content: '🌙'; position: absolute; font-size: 28px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); }

        .play-btn {
            width: 68px; height: 68px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 26px; cursor: pointer;
            transition: all 0.2s ease; box-shadow: 0 6px 20px rgba(99,102,241,0.5);
        }
        .play-btn:active { transform: scale(0.92); }

        .progress-ring { width: 120px; height: 120px; position: relative; margin: 0 auto 12px; }
        .progress-ring svg { transform: rotate(-90deg); }
        .progress-ring circle { fill: none; stroke-width: 4; }
        .progress-ring .bg { stroke: rgba(255,255,255,0.1); }
        .progress-ring .bar { stroke: url(#gradient); stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
        .progress-time {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 12px; color: #94a3b8;
        }
        .progress-time span { font-size: 18px; font-weight: 600; color: var(--text); }

        .vol-slider { width: 100%; height: 6px; -webkit-appearance: none; background: rgba(255,255,255,0.15); border-radius: 3px; outline: none; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #6366f1; cursor: pointer; box-shadow: 0 0 10px rgba(99,102,241,0.6); }

        .nav-btn {
            padding: 12px 10px; border-radius: 16px; font-size: 11px; font-weight: 600;
            transition: all 0.25s; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px);
        }
        .nav-btn:hover { background: rgba(99,102,241,0.15); transform: translateY(-2px); }

        .status-msg { font-size: 12px; text-align: center; min-height: 18px; color: #94a3b8; transition: all 0.3s; }
        .status-msg.error { color: #f87171; } .status-msg.success { color: #34d399; }
        
        .mode-btn {
            padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1; cursor: pointer; transition: all 0.2s;
        }
        .mode-btn:hover { background: rgba(99,102,241,0.2); }
        .mode-btn.active { background: #6366f1; color: white; border-color: #6366f1; }

        ::-webkit-scrollbar { width: 0; height: 0; }
        @media (max-width: 380px) { .glass { padding: 20px 16px; border-radius: 24px; } .vinyl { width: 90px; height: 90px; } }
    </style>
</head>
<body>
    <div class="stars" id="starfield"></div>

    <header class="text-center pt-4">
        <p class="text-primary-400 text-[9px] font-bold tracking-[0.4em] uppercase opacity-70 mb-1">Resource Commune Presents</p>
        <h1 class="text-2xl font-extralight tracking-[0.15em] text-white flex items-center justify-center gap-2">
            <span class="animate-float">🌙</span> 深夜书房
        </h1>
        <div class="h-[1px] w-16 bg-gradient-to-r from-transparent via-primary-500/40 to-transparent mx-auto mt-3"></div>
    </header>

    <main class="w-full max-w-[360px] glass p-6 text-center relative">
        <div id="vinyl" class="vinyl mx-auto mb-4"></div>
        <blockquote id="quote" class="text-[14px] text-gray-300 font-light leading-relaxed min-h-[48px] mb-3 flex items-center justify-center italic px-2" aria-live="polite">轻触播放，进入梦乡</blockquote>
        
        <audio id="player" preload="auto" loop></audio>

        <div class="progress-ring">
            <svg width="120" height="120">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#6366f1" />
                        <stop offset="100%" stop-color="#8b5cf6" />
                    </linearGradient>
                </defs>
                <circle class="bg" cx="60" cy="60" r="54"></circle>
                <circle class="bar" id="progressBar" cx="60" cy="60" r="54" stroke-dasharray="339.292" stroke-dashoffset="339.292"></circle>
            </svg>
            <div class="progress-time">
                <span id="currentTime">0:00</span>
                <div id="duration" class="text-[10px] opacity-60">/ ∞</div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-4 mb-2">
            <button id="playBtn" class="play-btn" aria-label="播放/暂停">
                <span id="playIcon">▶</span>
            </button>
            
            <div class="flex items-center gap-4 w-full max-w-[220px]">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15.586a2 2 0 002.828 0l5.657-5.657a1 1 0 000-1.414l-5.657-5.657a2 2 0 00-2.828 0L2 9.586l3.586 3.586z"/></svg>
                <input type="range" class="vol-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" aria-label="音量">
            </div>

            <div class="flex gap-2 flex-wrap justify-center">
                <button class="mode-btn active" onclick="setMode('rain')">🌧️ 暴雨助眠</button>
                <button class="mode-btn" onclick="setMode('deep')">🌌 深沉白噪</button>
                <button class="mode-btn" onclick="setMode('wind')">🍃 森林微风</button>
            </div>
        </div>
        
        <div id="statusMsg" class="status-msg mt-2" role="status" aria-live="polite">系统就绪，点击播放</div>
    </main>

    <nav class="grid grid-cols-2 gap-3 w-full max-w-[360px]">
        <button onclick="openTelegram('https://t.me/cnudo')" class="nav-btn text-primary-400">🔍 索引站</button>
        <button onclick="openTelegram('https://t.me/cxsns')" class="nav-btn text-white">🕹️ 软件站</button>
        <button onclick="openTelegram('https://t.me/sosotune')" class="nav-btn text-emerald-400">🎵 音乐库</button>
        <button onclick="openTelegram('https://t.me/soso_Group')" class="nav-btn text-slate-400">💬 交流群</button>
    </nav>

    <footer class="text-center pb-2">
        <p class="text-[8px] tracking-[0.25em] opacity-30 uppercase">
            资源公社 · 深夜书房 · <a href="https://t.me/mr518" class="text-primary-400 hover:text-primary-300 transition-colors">@mr518</a>
        </p>
    </footer>

    <script>
        // ================= Telegram 初始化 =================
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand?.(); if (tg.colorScheme === 'light') document.documentElement.setAttribute('data-theme', 'light'); }

        // ================= 核心变量 =================
        const vinyl = document.getElementById('vinyl');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const statusMsg = document.getElementById('statusMsg');
        const quote = document.getElementById('quote');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const circumference = 2 * Math.PI * 54;

        let audioCtx = null;
        let noiseNode = null;
        let gainNode = null;
        let isPlaying = false;
        let currentMode = 'rain';
        let startTime = 0;
        let timerInterval = null;

        // ================= 星空背景初始化 =================
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 4}s`;
            star.style.opacity = Math.random() * 0.7 + 0.3;
            starfield.appendChild(star);
        }

        // ================= 音频引擎 (Web Audio API 代码生成) =================
        // 这种方法不需要任何外部文件，100% 可靠
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 2; // 2秒缓冲
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            return buffer;
        }

        function setMode(mode) {
            currentMode = mode;
            modeBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const quotes = {
                'rain': '“雨落山林，心归宁静。”',
                'deep': '“深沉白噪，隔绝尘世。”',
                'wind': '“微风拂面，林间漫步。”'
            };
            quote.textContent = quotes[mode];
            
            if (isPlaying) {
                play(); // 重新播放以应用新音效
            }
        }

        function play() {
            initAudio();
            stop(); // 先停止旧的

            gainNode = audioCtx.createGain();
            gainNode.gain.value = parseFloat(volumeSlider.value);
            gainNode.connect(audioCtx.destination);

            const source = audioCtx.createBufferSource();
            source.buffer = createNoiseBuffer();
            source.loop = true;
            noiseNode = source;

            // 滤镜处理
            const filter = audioCtx.createBiquadFilter();
            if (currentMode === 'rain') {
                // 暴雨：低通滤波，模拟雨声
                filter.type = 'lowpass';
                filter.frequency.value = 800; 
            } else if (currentMode === 'deep') {
                // 深沉白噪：更低的低通，模拟轰鸣声
                filter.type = 'lowpass';
                filter.frequency.value = 400;
            } else if (currentMode === 'wind') {
                // 森林微风：带通滤波，模拟风声
                filter.type = 'bandpass';
                filter.frequency.value = 600;
                filter.Q.value = 1;
            }

            source.connect(filter);
            filter.connect(gainNode);
            source.start();

            isPlaying = true;
            updatePlayState(true);
            statusMsg.textContent = '🎵 正在播放 (代码生成音景)';
            statusMsg.className = 'status-msg success';
            startTimer();
        }

        function stop() {
            if (noiseNode) {
                try { noiseNode.stop(); } catch(e){}
                noiseNode = null;
            }
            isPlaying = false;
            updatePlayState(false);
            statusMsg.textContent = '⏸ 已暂停';
            statusMsg.className = 'status-msg';
            stopTimer();
        }

        function togglePlay() {
            if (isPlaying) {
                stop();
            } else {
                play();
            }
        }

        function updatePlayState(playing) {
            playIcon.textContent = playing ? '⏸' : '▶';
            vinyl.classList.toggle('playing', playing);
        }

        // ================= 进度条模拟 =================
        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                if (!isPlaying) return;
                const elapsed = (Date.now() - startTime) / 1000;
                currentTimeEl.textContent = formatTime(elapsed);
                // 模拟进度环转动
                const pct = (elapsed % 60) / 60; 
                progressBar.style.strokeDashoffset = circumference - (pct * circumference);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // ================= 事件监听 =================
        playBtn.addEventListener('click', togglePlay);
        
        volumeSlider.addEventListener('input', () => {
            if (gainNode) {
                gainNode.gain.value = parseFloat(volumeSlider.value);
            }
        });

        function openTelegram(url) {
            if (tg?.openTelegramLink) tg.openTelegramLink(url);
            else window.open(url, '_blank');
        }

        // PWA 安装提示逻辑
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            // 这里可以添加安装逻辑，为保持代码简洁暂略
        });

        window.addEventListener('load', () => {
            showStatus('💡 已切换至代码生成模式，无网络也可播放');
        });

        function showStatus(msg, type='') {
            statusMsg.textContent = msg;
            statusMsg.className = 'status-msg ' + type;
        }
    </script>
</body>
</html>
