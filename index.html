<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>🌙 深夜书房 - 资源公社旗下</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: { 400: '#818cf8', 500: '#6366f1' } },
                    animation: { 'float': 'float 6s ease-in-out infinite' }
                }
            }
        }
    </script>
    <style>
        :root { --bg: #0f172a; --surface: rgba(30, 41, 59, 0.85); --text: #f1f5f9; }
        body {
            background: var(--bg); color: var(--text);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 16px; overflow: hidden; -webkit-tap-highlight-color: transparent;
        }
        .stars { position: fixed; inset: 0; pointer-events: none; z-index: -1; background: radial-gradient(ellipse at 50% 0%, #1e1b4b 0%, #0f172a 40%, #020617 100%); }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 4s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        
        .glass {
            background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .vinyl {
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle, #111 20%, #222 21%, #111 22%, #222 35%, #111 36%, #222 55%, #111 56%);
            border: 3px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center;
            position: relative; transition: transform 0.3s;
        }
        .vinyl.playing { animation: spin 20s linear infinite; box-shadow: 0 0 30px rgba(99,102,241,0.4); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .vinyl::after { content: '🌙'; position: absolute; font-size: 24px; }

        .play-btn {
            width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; color: white; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4); transition: transform 0.2s;
        }
        .play-btn:active { transform: scale(0.95); }

        .progress-ring { width: 110px; height: 110px; position: relative; margin: 0 auto 10px; }
        .progress-ring svg { transform: rotate(-90deg); }
        .progress-ring circle { fill: none; stroke-width: 4; }
        .progress-ring .bg { stroke: rgba(255,255,255,0.1); }
        .progress-ring .bar { stroke: #6366f1; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
        .progress-time { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-time span { font-size: 16px; font-weight: 600; }
        .progress-time small { font-size: 10px; opacity: 0.6; }

        .vol-slider { width: 100%; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #6366f1; cursor: pointer; }

        .nav-btn {
            padding: 12px 8px; border-radius: 14px; font-size: 11px; font-weight: 600;
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s; backdrop-filter: blur(8px);
        }
        .nav-btn:hover { background: rgba(99,102,241,0.15); transform: translateY(-2px); }

        .mode-btn {
            padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; cursor: pointer;
        }
        .mode-btn.active { background: #6366f1; color: white; border-color: #6366f1; }
        
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>
    <div class="stars" id="starfield"></div>

    <header class="text-center pt-4">
        <p class="text-primary-400 text-[9px] font-bold tracking-[0.4em] uppercase opacity-70 mb-1">Resource Commune</p>
        <h1 class="text-2xl font-extralight tracking-wider text-white flex items-center justify-center gap-2">
            <span class="animate-float">🌙</span> 深夜书房
        </h1>
    </header>

    <main class="w-full max-w-[340px] glass p-6 text-center relative">
        <div id="vinyl" class="vinyl mx-auto mb-4"></div>
        <p id="quote" class="text-[13px] text-gray-300 font-light italic mb-4 min-h-[40px]">轻触播放，进入梦乡</p>
        
        <div class="progress-ring">
            <svg width="110" height="110">
                <circle class="bg" cx="55" cy="55" r="50"></circle>
                <circle class="bar" id="progressBar" cx="55" cy="55" r="50" stroke-dasharray="314.16" stroke-dashoffset="314.16"></circle>
            </svg>
            <div class="progress-time">
                <span id="timeDisplay">0:00</span>
                <small>循环播放中</small>
            </div>
        </div>

        <button id="playBtn" class="play-btn mx-auto mb-4">▶</button>

        <div class="flex items-center gap-3 w-full max-w-[200px] mx-auto mb-4">
            <span class="text-xs text-gray-400">🔊</span>
            <input type="range" class="vol-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.6">
        </div>

        <div class="flex gap-2 justify-center mb-2">
            <button class="mode-btn active" onclick="setMode('brown')">🌧️ 暴雨白噪</button>
            <button class="mode-btn" onclick="setMode('deep')">🌌 深沉低频</button>
            <button class="mode-btn" onclick="setMode('wind')">🍃 森林微风</button>
        </div>
        <p id="statusText" class="text-[11px] text-gray-500 mt-2">已就绪</p>
    </main>

    <!-- 恢复你原来的 4 个跳转按钮 -->
    <nav class="grid grid-cols-2 gap-3 w-full max-w-[340px]">
        <button onclick="openTG('https://t.me/cnudo')" class="nav-btn text-primary-400">🔍 索引站</button>
        <button onclick="openTG('https://t.me/cxsns')" class="nav-btn text-white">🕹️ 软件站</button>
        <button onclick="openTG('https://t.me/sosotune')" class="nav-btn text-emerald-400">🎵 音乐库</button>
        <button onclick="openTG('https://t.me/soso_Group')" class="nav-btn text-slate-400">💬 交流群</button>
    </nav>

    <footer class="text-center pb-2">
        <p class="text-[8px] tracking-widest opacity-30 uppercase">资源公社 · @mr518</p>
    </footer>

    <script>
        // 1. Telegram 环境适配
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand?.(); }

        // 2. 核心音频引擎 (浏览器原生算法生成，不依赖任何外部链接)
        let audioCtx, noiseSource, gainNode, filterNode;
        let isPlaying = false, startTime = 0, timerInterval = null;
        let currentMode = 'brown';

        const modes = {
            brown: { freq: 600, type: 'lowpass', quote: '“雨落山林，心归宁静。”' },
            deep: { freq: 250, type: 'lowpass', quote: '“深沉白噪，隔绝尘世。”' },
            wind: { freq: 800, type: 'bandpass', quote: '“微风拂面，林间漫步。”' }
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // 核心修复：严格遵循浏览器策略，用户点击后才恢复上下文
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            return buffer;
        }

        function playAudio() {
            initAudio();
            stopAudio(); // 清理旧节点

            const source = audioCtx.createBufferSource();
            source.buffer = createNoiseBuffer();
            source.loop = true;
            noiseSource = source;

            filterNode = audioCtx.createBiquadFilter();
            const cfg = modes[currentMode];
            filterNode.type = cfg.type;
            filterNode.frequency.value = cfg.freq;
            if(currentMode === 'wind') filterNode.Q.value = 0.8;

            gainNode = audioCtx.createGain();
            gainNode.gain.value = parseFloat(document.getElementById('volumeSlider').value);

            source.connect(filterNode);
            filterNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            source.start();

            isPlaying = true;
            startTime = Date.now();
            updateUI(true);
            startTimer();
            document.getElementById('quote').textContent = cfg.quote;
            document.getElementById('statusText').textContent = '🎵 算法生成音景运行中';
        }

        function stopAudio() {
            if (noiseSource) { try { noiseSource.stop(); } catch(e){} noiseSource = null; }
            isPlaying = false;
            updateUI(false);
            stopTimer();
            document.getElementById('statusText').textContent = '⏸ 已暂停';
        }

        function updateUI(playing) {
            document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
            document.getElementById('vinyl').classList.toggle('playing', playing);
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (isPlaying) playAudio(); // 热切换
        }

        // 3. 计时器与进度环
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPlaying) return;
                const sec = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(sec / 60), s = sec % 60;
                document.getElementById('timeDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
                // 进度环模拟循环
                const pct = (sec % 60) / 60;
                document.getElementById('progressBar').style.strokeDashoffset = 314.16 - (pct * 314.16);
            }, 500);
        }
        function stopTimer() { clearInterval(timerInterval); }

        // 4. 事件绑定
        document.getElementById('playBtn').addEventListener('click', () => isPlaying ? stopAudio() : playAudio());
        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            if (gainNode) gainNode.gain.value = parseFloat(e.target.value);
        });

        function openTG(url) {
            if (tg?.openTelegramLink) tg.openTelegramLink(url);
            else window.open(url, '_blank');
        }

        // 5. 星空背景初始化
        const starfield = document.getElementById('starfield');
        for(let i=0; i<40; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.cssText = `left:${Math.random()*100}%; top:${Math.random()*100}%; animation-delay:${Math.random()*4}s; opacity:${Math.random()*0.6+0.2}`;
            starfield.appendChild(s);
        }
    </script>
</body>
</html>
